<?xml version="1.0" encoding="UTF-8"?>
<!--
  Mapa fantasy default — pergaminho desenhado a mão.
  Estilo: cartógrafo Tolkien-esco, tinta sépia sobre papel envelhecido.
  Regiões coincidem com REGIONS_DEFAULT em src/utils/token-position.js:
    forest  (0.18, 0.55)  → mata oeste
    castle  (0.50, 0.45)  → Pedra do Rei (centro)
    tower   (0.22, 0.40)  → Torre Arcana
    ruins   (0.82, 0.65)  → Ruínas de Tharos (leste)
    village (0.42, 0.80)  → Aldeia do Cervo (sul)
    port    (0.80, 0.78)  → Porto Pedra (sudeste)
  Licença: CC0 (este arquivo) — gerado para o projeto dnd-ficha-app.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="paper" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#f4ead3"/>
      <stop offset="55%" stop-color="#d4be94"/>
      <stop offset="100%" stop-color="#9c8259"/>
    </radialGradient>
    <radialGradient id="stainA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a4530" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5a4530" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="forestG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d5530" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#3d5530" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3d5530" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="seaG" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#456073" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#456073" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"/>
      <feColorMatrix values="0 0 0 0 0.16  0 0 0 0 0.12  0 0 0 0 0.08  0 0 0 0.25 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- Base pergaminho -->
  <rect width="800" height="600" fill="url(#paper)"/>
  <!-- Manchas de tinta antigas -->
  <ellipse cx="140" cy="430" rx="80" ry="22" fill="url(#stainA)"/>
  <ellipse cx="640" cy="120" rx="110" ry="30" fill="url(#stainA)"/>
  <ellipse cx="380" cy="540" rx="90" ry="20" fill="url(#stainA)"/>

  <!-- Áreas em aquarela: biomas -->
  <!-- Mata oeste (cobre região "forest" em 0.18, 0.55) -->
  <ellipse cx="144" cy="330" rx="125" ry="80" fill="url(#forestG)"/>
  <!-- Mata leste -->
  <ellipse cx="620" cy="300" rx="110" ry="70" fill="url(#forestG)"/>
  <!-- Mar ao sul (cobre port em 0.80, 0.78) -->
  <ellipse cx="400" cy="560" rx="450" ry="80" fill="url(#seaG)"/>
  <!-- Mancha desértica (ruínas leste) -->
  <ellipse cx="660" cy="390" rx="80" ry="50" fill="#b89855" opacity="0.25"/>

  <!-- Textura granulada do papel sobreposta -->
  <rect width="800" height="600" fill="#3a2b1c" opacity="0.08" filter="url(#grain)"/>

