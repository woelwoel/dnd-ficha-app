                 M0,15 L6,4 L12,15 Z M10,13 L16,2 L22,13 Z M20,15 L26,4 L32,15 Z M30,13 L36,2 L42,13 Z M40,15 L46,4 L52,15 Z M50,13 L56,2 L62,13 Z M60,15 L66,4 L72,15 Z M70,13 L76,2 L82,13 Z M80,15 L86,4 L92,15 Z M90,13 L96,2 L102,13 Z M100,15 L106,4 L112,15 Z
                 M5,30 L11,19 L17,30 Z M15,28 L21,17 L27,28 Z M25,30 L31,19 L37,30 Z M35,28 L41,17 L47,28 Z M45,30 L51,19 L57,30 Z M55,28 L61,17 L67,28 Z M65,30 L71,19 L77,30 Z M75,28 L81,17 L87,28 Z M85,30 L91,19 L97,30 Z M95,28 L101,17 L107,28 Z"/>
