                 M0,15 L6,4 L12,15 Z M10,13 L16,2 L22,13 Z M20,15 L26,4 L32,15 Z M30,13 L36,2 L42,13 Z M40,15 L46,4 L52,15 Z M50,13 L56,2 L62,13 Z M60,15 L66,4 L72,15 Z M70,13 L76,2 L82,13 Z M80,15 L86,4 L92,15 Z M90,13 L96,2 L102,13 Z M100,15 L106,4 L112,15 Z M110,13 L116,2 L122,13 Z M120,15 L126,4 L132,15 Z
                 M5,30 L11,19 L17,30 Z M15,28 L21,17 L27,28 Z M25,30 L31,19 L37,30 Z M35,28 L41,17 L47,28 Z M45,30 L51,19 L57,30 Z M55,28 L61,17 L67,28 Z M65,30 L71,19 L77,30 Z M75,28 L81,17 L87,28 Z M85,30 L91,19 L97,30 Z M95,28 L101,17 L107,28 Z M105,30 L111,19 L117,30 Z M115,28 L121,17 L127,28 Z
                 M0,45 L6,34 L12,45 Z M10,43 L16,32 L22,43 Z M20,45 L26,34 L32,45 Z M30,43 L36,32 L42,43 Z M40,45 L46,34 L52,45 Z M50,43 L56,32 L62,43 Z M60,45 L66,34 L72,45 Z M70,43 L76,32 L82,43 Z M80,45 L86,34 L92,45 Z M90,43 L96,32 L102,43 Z M100,45 L106,34 L112,45 Z"/>
      </g>
